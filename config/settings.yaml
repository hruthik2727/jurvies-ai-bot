bot:
  name: "Jurvies"
  version: "1.0.0"
  description: "Jurvies AI Bot — Powered by Google Gemini"

model:
  name: "gemini-2.5-flash"
  max_tokens: 1024
  temperature: 0.7

memory:
  max_history_length: 50   # Max messages per session
  session_ttl_minutes: 60  # Auto-expire sessions after 60 min

server:
  host: "0.0.0.0"
  port: 8000
  reload: false

logging:
  level: "INFO"
  file: "logs/jurvies.log"
  format: "%(asctime)s | %(levelname)s | %(name)s | %(message)s"
