<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jurvies AI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #343541;
            color: #ececf1;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        /* Header */
        .header {
            background: #202123;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #4d4d4f;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .new-chat-btn {
            padding: 8px 12px;
            background: transparent;
            border: 1px solid #565869;
            border-radius: 6px;
            color: #ececf1;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        
        .new-chat-btn:hover {
            background: #40414f;
        }
        
        .model-badge {
            padding: 6px 12px;
            background: #40414f;
            border-radius: 6px;
            font-size: 13px;
            color: #c5c5d2;
        }
        
        /* Chat Container */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        
        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .chat-container::-webkit-scrollbar-thumb {
            background: #565869;
            border-radius: 4px;
        }
        
        /* Welcome */
        .welcome {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        
        .welcome-title {
            font-size: 32px;
            font-weight: 600;
            margin-bottom: 32px;
            color: #ececf1;
        }
        
        .examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 12px;
            width: 100%;
            max-width: 900px;
        }
        
        .example-card {
            padding: 16px;
            background: #444654;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }
        
        .example-card:hover {
            background: #4d4d5f;
        }
        
        .example-title {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            color: #ececf1;
        }
        
        .example-text {
            font-size: 13px;
            color: #c5c5d2;
        }
        
        /* Messages */
        .message-wrapper {
            width: 100%;
            border-bottom: 1px solid #4d4d4f;
        }
        
        .message-wrapper.user {
            background: #343541;
        }
        
        .message-wrapper.assistant {
            background: #444654;
        }
        
        .message {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px;
            display: flex;
            gap: 24px;
        }
        
        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        
        .avatar.user {
            background: #5436da;
        }
        
        .avatar.assistant {
            background: #19c37d;
        }
        
        .message-content {
            flex: 1;
            line-height: 1.7;
            font-size: 16px;
            color: #ececf1;
            word-wrap: break-word;
        }
        
        /* Typing Indicator */
        .typing {
            display: flex;
            gap: 4px;
            padding: 4px 0;
        }
        
        .typing-dot {
            width: 8px;
            height: 8px;
            background: #8e8ea0;
            border-radius: 50%;
            animation: typing 1.4s infinite;
        }
        
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes typing {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-10px); }
        }
        
        /* Input Area */
        .input-area {
            padding: 24px;
            background: #343541;
        }
        
        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }
        
        .input-container {
            display: flex;
            align-items: flex-end;
            background: #40414f;
            border-radius: 12px;
            padding: 12px;
            box-shadow: 0 0 0 1px #565869;
            transition: box-shadow 0.2s;
        }
        
        .input-container:focus-within {
            box-shadow: 0 0 0 2px #565869;
        }
        
        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            color: #ececf1;
            font-size: 16px;
            font-family: inherit;
            resize: none;
            max-height: 200px;
            line-height: 1.5;
        }
        
        #messageInput::placeholder {
            color: #8e8ea0;
        }
        
        #sendButton {
            width: 32px;
            height: 32px;
            background: #19c37d;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
            margin-left: 8px;
        }
        
        #sendButton:hover:not(:disabled) {
            background: #1a9f6a;
        }
        
        #sendButton:disabled {
            background: #40414f;
            cursor: not-allowed;
        }
        
        .send-icon {
            width: 16px;
            height: 16px;
            fill: white;
        }
        
        .input-hint {
            text-align: center;
            font-size: 12px;
            color: #8e8ea0;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <button class="new-chat-btn" onclick="newChat()">
                <span>+</span>
                <span>New chat</span>
            </button>
        </div>
        <div class="model-badge">Gemini 2.5 Flash</div>
    </div>

    <!-- Chat Container -->
    <div class="chat-container" id="chatContainer">
        <!-- Welcome Screen -->
        <div class="welcome" id="welcomeScreen">
            <h1 class="welcome-title">Jurvies AI</h1>
            <p style="color: #c5c5d2; font-size: 15px; margin-bottom: 24px;">Clear answers • Step-by-step guides • Friendly help 😊</p>
            <div class="examples">
                <div class="example-card" onclick="sendExample('Explain quantum computing')">
                    <div class="example-title">💡 Explain</div>
                    <div class="example-text">"Explain quantum computing"</div>
                </div>
                <div class="example-card" onclick="sendExample('Write a creative story')">
                    <div class="example-title">✍️ Create</div>
                    <div class="example-text">"Write a creative story"</div>
                </div>
                <div class="example-card" onclick="sendExample('Help me code')">
                    <div class="example-title">💻 Code</div>
                    <div class="example-text">"Help me code"</div>
                </div>
            </div>
        </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
        <div class="input-wrapper">
            <div class="input-container">
                <textarea 
                    id="messageInput" 
                    placeholder="Send a message..."
                    rows="1"
                    onkeydown="handleKeyPress(event)"
                    oninput="autoResize(this)"
                ></textarea>
                <button id="sendButton" onclick="sendMessage()">
                    <svg class="send-icon" viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                    </svg>
                </button>
            </div>
            <div class="input-hint">Press Enter to send, Shift + Enter for new line</div>
        </div>
    </div>


    <script>
        let sessionId = null;

        function autoResize(textarea) {
            textarea.style.height = 'auto';
            textarea.style.height = Math.min(textarea.scrollHeight, 200) + 'px';
        }

        function handleKeyPress(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function sendExample(text) {
            document.getElementById('messageInput').value = text;
            sendMessage();
        }

        function newChat() {
            sessionId = null;
            document.getElementById('chatContainer').innerHTML = `
                <div class="welcome" id="welcomeScreen">
                    <h1 class="welcome-title">Jurvies AI</h1>
                    <p style="color: #c5c5d2; font-size: 15px; margin-bottom: 24px;">Clear answers • Step-by-step guides • Friendly help 😊</p>
                    <div class="examples">
                        <div class="example-card" onclick="sendExample('Explain quantum computing')">
                            <div class="example-title">💡 Explain</div>
                            <div class="example-text">"Explain quantum computing"</div>
                        </div>
                        <div class="example-card" onclick="sendExample('Write a creative story')">
                            <div class="example-title">✍️ Create</div>
                            <div class="example-text">"Write a creative story"</div>
                        </div>
                        <div class="example-card" onclick="sendExample('Help me code')">
                            <div class="example-title">💻 Code</div>
                            <div class="example-text">"Help me code"</div>
                        </div>
                    </div>
                </div>
            `;
            document.getElementById('messageInput').value = '';
            document.getElementById('messageInput').style.height = 'auto';
        }

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Hide welcome screen
            const welcomeScreen = document.getElementById('welcomeScreen');
            if (welcomeScreen) {
                welcomeScreen.remove();
            }
            
            // Add user message
            addMessage(message, 'user');
            input.value = '';
            input.style.height = 'auto';
            
            // Disable send button
            const sendButton = document.getElementById('sendButton');
            sendButton.disabled = true;
            
            // Show typing indicator
            showTyping();
            
            try {
                const response = await fetch('http://localhost:8000/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        session_id: sessionId
                    })
                });
                
                removeTyping();
                
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                
                const data = await response.json();
                sessionId = data.session_id;
                
                // Add assistant response
                addMessage(data.message, 'assistant');
                
            } catch (error) {
                console.error('Error:', error);
                removeTyping();
                addMessage('Sorry, I encountered an error. Please try again.', 'assistant');
            } finally {
                sendButton.disabled = false;
            }
        }

        function addMessage(content, role) {
            const container = document.getElementById('chatContainer');
            
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;
            
            const message = document.createElement('div');
            message.className = 'message';
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${role}`;
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const messageContent = document.createElement('div');
            messageContent.className = 'message-content';
            messageContent.textContent = content;
            
            message.appendChild(avatar);
            message.appendChild(messageContent);
            wrapper.appendChild(message);
            container.appendChild(wrapper);
            
            // Scroll to bottom
            container.scrollTop = container.scrollHeight;
        }


        function showTyping() {
            const container = document.getElementById('chatContainer');
            
            const wrapper = document.createElement('div');
            wrapper.className = 'message-wrapper assistant';
            wrapper.id = 'typingIndicator';
            
            const message = document.createElement('div');
            message.className = 'message';
            
            const avatar = document.createElement('div');
            avatar.className = 'avatar assistant';
            avatar.textContent = '🤖';
            
            const typing = document.createElement('div');
            typing.className = 'message-content';
            typing.innerHTML = `
                <div class="typing">
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                    <div class="typing-dot"></div>
                </div>
            `;
            
            message.appendChild(avatar);
            message.appendChild(typing);
            wrapper.appendChild(message);
            container.appendChild(wrapper);
            
            container.scrollTop = container.scrollHeight;
        }

        function removeTyping() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        // Focus input on load
        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
